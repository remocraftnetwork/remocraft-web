name: Generate announcements JSON

on:
  issues:
    types: [labeled, unlabeled]

jobs:
  build-json:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      issues: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node (for github-script)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate announcements JSON files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const perPage = 50;

            async function fetchByLabel(label) {
              const res = await github.rest.issues.listForRepo({
                owner,
                repo,
                labels: label,
                state: 'all',
                per_page: perPage,
                sort: 'created',
                direction: 'desc'
              });
              const items = (res.data || []).map(issue => ({
                number: issue.number,
                title: issue.title,
                body: issue.body,
                url: issue.html_url,
                created_at: issue.created_at,
                updated_at: issue.updated_at,
                state: issue.state,
                author: 'RemoCraft Announcements',
                labels: (issue.labels || []).map(l => (typeof l === 'string' ? l : l.name))
              }));
              return items;
            }

            const outDir = path.join(process.cwd(), 'assets');
            if (!fs.existsSync(outDir)) fs.mkdirSync(outDir);

            const en = await fetchByLabel('announcement-en');
            const es = await fetchByLabel('announcement-es');

            fs.writeFileSync(path.join(outDir, 'announcements-en.json'), JSON.stringify(en, null, 2));
            fs.writeFileSync(path.join(outDir, 'announcements-es.json'), JSON.stringify(es, null, 2));

            console.log(`Wrote ${en.length} English and ${es.length} Spanish announcements to /assets/`);

      - name: Notify Discord announcement channel (English)
        if: github.event.issue && github.event.action == 'labeled' && github.event.label.name == 'announcement-en'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue || {};
            const webhookUrl = process.env.WEBHOOK_DISCORD_ANNOUNCEMENTS_EN;
            console.log('Discord notification step running for issue', issue.number, 'action:', context.payload.action, 'label:', context.payload.label?.name, 'labels:', (issue.labels || []).map(l => typeof l === 'string' ? l : l.name));
            if (!webhookUrl) throw new Error('Missing Discord webhook secret WEBHOOK_DISCORD_ANNOUNCEMENTS_EN');

            const announcementsPage = 'https://www.remocraft.com/announcements.html';
            const announcementRole = '<@&1348382542343966800>';
            const body = (issue.body || 'No description provided.').trim().slice(0, 3960);
            const embed = {
              title: issue.title || 'New English announcement',
              description: `${body}\n\n${announcementRole}`,
              url: announcementsPage,
              color: 5814783,
              timestamp: issue.created_at
            };

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                username: 'RemoCraft Announcements',
                content: '',
                embeds: [embed],
                allowed_mentions: {
                  roles: ['1348382542343966800']
                }
              })
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Discord webhook returned ${response.status}: ${text}`);
            }
        env:
          WEBHOOK_DISCORD_ANNOUNCEMENTS_EN: ${{ secrets.WEBHOOK_DISCORD_ANNOUNCEMENTS_EN }}

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/announcements-*.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update announcements JSON" || true
            git push
          else
            echo "No changes to commit"
          fi
