<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RemoCraft | Anuncios</title>
<link rel="icon" href="../images/logo.png">
<link rel="stylesheet" href="../css/global.css">
<style>
  :root{--accent:#8bd6ff;--muted:#bdbdbd}
  body{background:#151515;color:#fff;margin:0;font-family:Inter,system-ui,Arial}
  .navbar{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px 20px;display:flex;align-items:center}
  .logo{display:flex;gap:10px;align-items:center;text-decoration:none;color:inherit}
  .logo img{width:40px;height:40px}
  .container{max-width:1100px;margin:28px auto;padding:0 20px}
  h1{font-size:32px;margin:10px 0 6px}
  .lead{color:var(--muted);margin-bottom:18px}
  .grid{display:flex;flex-direction:column;gap:16px}
  .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);padding:18px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.6);opacity:0;transform:translateY(6px);transition:opacity .18s,transform .18s}
  .card.show{opacity:1;transform:none}
  .card h2{margin:0;font-size:18px;color:var(--accent)}
  .meta{color:var(--muted);font-size:13px;margin-top:6px;margin-bottom:12px}
  .content{color:#e6e6e6;line-height:1.5}
  .pagination{display:flex;justify-content:center;gap:12px;margin-top:22px}
  .mc-btn{background:linear-gradient(180deg,#2b2b2b,#1b1b1b);border:2px solid rgba(255,255,255,0.06);color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer}
  .mc-btn[disabled]{opacity:.4;cursor:not-allowed}
  .loading,.error{text-align:center;color:var(--muted);margin:30px 0}
</style>
</head>
<body>
  <div class="navbar">
    <a class="logo" href="../index.html">
      <img src="../images/logo.png" alt="logo">
      <div>
        <div style="font-weight:700">RemoCraft</div>
        <div style="font-size:12px;color:var(--muted)">Anuncios</div>
      </div>
    </a>
    <nav style="margin-left:auto">
      <a href="../index.html" style="color:var(--muted);text-decoration:none;margin-right:12px">Inicio</a>
      <a href="../rules.html" style="color:var(--muted);text-decoration:none;margin-right:12px">Reglas</a>
      <a href="../team.html" style="color:var(--muted);text-decoration:none">Equipo</a>
    </nav>
  </div>

  <main class="container">
    <h1>Anuncios</h1>
    <p class="lead">Últimos arreglos y novedades. Se cargan automáticamente desde el repositorio.</p>

    <div id="announcements" class="grid" aria-live="polite"></div>

    <div id="pagination" class="pagination" style="display:none">
      <button id="prevBtn" class="mc-btn">Anterior</button>
      <button id="nextBtn" class="mc-btn">Siguiente</button>
    </div>

    <div id="status" class="loading">Cargando anuncios...</div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const jsonPath = '/assets/announcements-es.json';
const perPage = 10;
let announcements = [];
let currentPage = 0;
const container = document.getElementById('announcements');
const status = document.getElementById('status');
const pagination = document.getElementById('pagination');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

async function loadAnnouncements(){
  try{
    status.textContent = 'Cargando anuncios...';
    const res = await fetch(jsonPath, {cache: 'no-cache'});
    if(!res.ok) throw new Error('Network error');
    announcements = await res.json();
    if(!Array.isArray(announcements)) announcements = [];
    currentPage = 0;
    renderPage();
    status.style.display = 'none';
    pagination.style.display = announcements.length > perPage ? 'flex' : 'none';
  }catch(e){
    console.error(e);
    status.className = 'error';
    status.textContent = 'No se pudieron cargar los anuncios. Intenta más tarde.';
  }
}

function renderPage(){
  container.innerHTML = '';
  const start = currentPage * perPage;
  const pageItems = announcements.slice(start, start + perPage);
  if(pageItems.length === 0){
    container.innerHTML = '<div class="card show"><div class="meta">No hay anuncios</div></div>';
    pagination.style.display = 'none';
    return;
  }
  pageItems.forEach((a, idx) => {
    const card = document.createElement('article');
    card.className = 'card';
    const title = document.createElement('h2');
    title.textContent = a.title || `Anuncio #${a.number || (start+idx+1)}`;
    const meta = document.createElement('div');
    meta.className = 'meta';
    const date = a.created_at ? new Date(a.created_at).toLocaleString() : '';
    meta.textContent = `${date} · ${a.author || 'desconocido'}`;
    const content = document.createElement('div');
    content.className = 'content';
    content.innerHTML = marked.parse(a.body || '');
    card.appendChild(title);
    card.appendChild(meta);
    card.appendChild(content);
    container.appendChild(card);
    requestAnimationFrame(() => card.classList.add('show'));
  });
  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = (start + perPage) >= announcements.length;
}

prevBtn.addEventListener('click', () => { if(currentPage>0){ currentPage--; renderPage(); window.scrollTo({top:0,behavior:'smooth'}) } });
nextBtn.addEventListener('click', () => { if((currentPage+1)*perPage < announcements.length){ currentPage++; renderPage(); window.scrollTo({top:0,behavior:'smooth'}) } });

loadAnnouncements();
</script>
</body>
</html>
